<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HireTrends</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="background-animation">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
        <div class="shape shape4"></div>
        <div class="shape shape5"></div>
    </div>

    <!-- Registration Form -->
    <div class="container">
        <div class="form-container">
            <h2 class="form-title">Register for HireTrends</h2>
            
            <div id="alert" class="alert" style="display: none;"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Create a password" required>
                </div>
                
                <div class="form-group">
                    <label for="branch" class="form-label">Branch</label>
                    <select id="branch" class="form-input" required>
                        <option id="my2" value="">Select your branch</option>
                        <option id="my1" value="CSE">Computer Science & Engineering</option>
                        <option id="my1" value="IT">Information Technology</option>
                        <option id="my1" value="ECE">Electronics & Communication Engineering</option>
                        <option id="my1" value="EEE">Electrical & Electronics Engineering</option>
                        <option id="my1" value="ME">Mechanical Engineering</option>
                        <option id="my1" value="CE">Civil Engineering</option>
                        <option id="my1" value="AI-ML">AI & Machine Learning</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="cgpa" class="form-label">CGPA</label>
                    <input type="number" id="cgpa" class="form-input" placeholder="Enter your CGPA" step="0.01" min="0" max="10" required>
                </div>
                
                <button type="submit" class="form-submit">Register</button>
            </form>
            
            <div class="form-footer">
                <p>Already have an account? <a href="login.html" class="form-link">Login here</a></p>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
