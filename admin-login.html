<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - HireTrends</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="background-animation">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
        <div class="shape shape4"></div>
        <div class="shape shape5"></div>
    </div>

    <!-- Admin Login Form -->
    <div class="container">
        <div class="form-container">
            <h2 class="form-title">Admin Login</h2>
            
            <div id="adminAlert" class="alert" style="display: none;"></div>
            
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="adminEmail" class="form-label">Email Address</label>
                    <input type="email" id="adminEmail" class="form-input" placeholder="Enter admin email" required value="sy6220639@gmail.com">
                </div>
                
                <div class="form-group">
                    <label for="adminPassword" class="form-label">Password</label>
                    <input type="password" id="adminPassword" class="form-input" placeholder="Enter admin password" required value="Shivam12">
                </div>
                
                <button type="submit" class="form-submit">Login</button>
            </form>
            
            <div class="form-footer">
                <p><a href="login.html" class="form-link">Back to Student Login</a></p>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/admin-login.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
